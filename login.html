<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Stackly NGO Salem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal:#1abc9c; --teal-dark:#16a085;
            --yellow:#f1c40f; --yellow-dark:#d4ac0d;
            --red:#e74c3c; --red-dark:#c0392b;
            --text-dark:#222; --text-gray:#666; --text-light:#999;
            --bg-light:#f9f9f9; --bg-dark:#1a1a1a;
            --border:#e5e5e5; --font:'Manrope',sans-serif;
            --green:#2ecc71;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth}
        html,body{overflow-x:hidden}
        body{color:var(--text-gray);line-height:1.6;font-family:var(--font)}

        .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;font-weight:700;font-size:15px;border:none;cursor:pointer;transition:all .3s;border-radius:4px}
        .btn-teal{background:var(--teal);color:#fff}
        .btn-teal:hover{background:var(--teal-dark);transform:translateY(-2px);box-shadow:0 8px 20px rgba(26,188,156,.3)}

        /* ===== AUTH PAGE ===== */
        .auth-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            background: url('https://images.unsplash.com/photo-1593113565694-c6f1308a0d9b?q=80&w=1920') center/cover no-repeat;
            position: relative;
        }
        .auth-overlay {
            position: absolute; inset: 0; background: linear-gradient(135deg, rgba(20,20,20,0.85), rgba(26,188,156,0.6));
        }
        .auth-card {
            position: relative; z-index: 10;
            background: #fff;
            border-radius: 24px;
            padding: 50px 45px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
            animation: fadeUp 0.8s ease both;
        }
        .auth-head { text-align: center; margin-bottom: 25px; }
        .auth-head h2 { font-size: 2rem; color: var(--text-dark); margin-bottom: 8px; }
        .auth-head p { color: var(--text-gray); font-size: 0.95rem; }
        
        .role-tabs { display: flex; gap: 10px; margin-bottom: 25px; background: var(--bg-light); padding: 5px; border-radius: 12px; }
        .role-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; border-radius: 8px; font-weight: 700; font-size: 0.9rem; transition: 0.3s; color: var(--text-gray); display:flex; align-items:center; justify-content:center; gap:8px;}
        .role-tab.active { background: #fff; color: var(--teal); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group label { font-size: 0.85rem; font-weight: 800; color: var(--text-dark); margin-bottom: 8px; display: block; }
        .input-group input { width: 100%; padding: 14px 18px; border: 2px solid var(--border); border-radius: 10px; font-size: 0.92rem; font-family: var(--font); transition: 0.3s; background: #fff; }
        .input-group input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 4px rgba(26,188,156,0.1); }
        .input-group input.is-invalid { border-color: var(--red); }
        
        .field-error { color: var(--red); font-size: 0.8rem; font-weight: 600; margin-top: 4px; display: none; }
        .field-error.active { display: block; }
        
        .auth-options { display: flex; justify-space-between: align-items: center; margin-bottom: 25px; font-size: 0.85rem; }
        .auth-options .remember { display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-gray); font-weight:600;}
        .auth-options .forgot-link { color: var(--teal); font-weight: 700; transition: 0.3s; }
        .auth-options .forgot-link:hover { color: var(--teal-dark); }
        
        .submit-btn { width: 100%; padding: 16px; border-radius: 10px; font-size: 1rem; }
        .auth-footer { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-gray); }
        .auth-footer a { color: var(--teal); font-weight: 800; transition: 0.3s; }
        .auth-footer a:hover { color: var(--teal-dark); }

        @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

        @media(max-width:560px){
            .auth-card { padding: 40px 25px; }
        }
    </style>
</head>
<body>

<section class="auth-section">
    <div class="auth-overlay"></div>
    <div class="auth-card">
        <div class="auth-head">
            <h2>Welcome Back</h2>
            <p>Log in to continue your impact journey.</p>
        </div>
        
        <div class="role-tabs">
            <div class="role-tab active" onclick="setRole('user', this)"><i class="fa-solid fa-user"></i> User</div>
            <div class="role-tab" onclick="setRole('admin', this)"><i class="fa-solid fa-shield-halved"></i> Admin</div>
        </div>
        
        <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
            <input type="hidden" id="loginRole" value="user">
            
            <div class="input-group">
                <label>Email Address *</label>
                <input type="email" id="loginEmail" required placeholder="you@example.com">
                <span class="field-error" id="emailErr">Please enter a valid email address</span>
            </div>
            
            <div class="input-group">
                <label>Password *</label>
                <input type="password" id="loginPass" required minlength="8" placeholder="••••••••">
                <span class="field-error" id="passErr">Password must be at least 8 characters</span>
            </div>
            
            <div class="auth-options">
                <label class="remember"><input type="checkbox"> Remember me</label>
                <a href="forgotpassword.html" class="forgot-link">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn btn-teal submit-btn" id="loginBtn">
                Log In <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
            
            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign up</a>
            </div>
        </form>
    </div>
</section>

<script>
    function setRole(role, el) {
        document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('loginRole').value = role;
    }

    function handleLogin(e) {
        e.preventDefault();
        let valid = true;

        const email = document.getElementById('loginEmail');
        const emailErr = document.getElementById('emailErr');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email.value.trim())) {
            emailErr.classList.add('active'); email.classList.add('is-invalid'); valid = false;
        } else {
            emailErr.classList.remove('active'); email.classList.remove('is-invalid');
        }

        const pass = document.getElementById('loginPass');
        const passErr = document.getElementById('passErr');
        if (pass.value.length < 8) {
            passErr.classList.add('active'); pass.classList.add('is-invalid'); valid = false;
        } else {
            passErr.classList.remove('active'); pass.classList.remove('is-invalid');
        }

        if (!valid) return;

        const btn = document.getElementById('loginBtn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
        btn.disabled = true;
        
        const role = document.getElementById('loginRole').value;
        setTimeout(() => {
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Login Successful';
            btn.style.background = 'var(--green)';
            setTimeout(() => {
                if (role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'user-dashboard.html';
                }
            }, 1000);
        }, 1500);
    }
</script>
</body>
</html>
