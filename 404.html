<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Stackly NGO Salem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal:#1abc9c; --teal-dark:#16a085;
            --yellow:#f1c40f; 
            --text-dark:#222; --text-gray:#666; --text-light:#999;
            --bg-light:#f9f9f9; --bg-dark:#1a1a1a;
            --border:#e5e5e5; --font:'Manrope',sans-serif;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth}
        html,
        /* Global Mobile Overflow Fix */
        html, body {
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            position: relative;
        }
body{overflow-x:hidden}
        body{font-family:var(--font);color:var(--text-gray);line-height:1.6}
        .container{max-width:1200px;margin:0 auto;padding:0 20px}
        h1,h2,h3,h4,h5,h6{color:var(--text-dark);font-weight:700;line-height:1.2}
        a{text-decoration:none;color:inherit}
        ul{list-style:none}
        
        /* ===== HEADER ===== */
        .main-header {position:fixed;top:0;left:0;width:100%;padding: 15px 0;z-index:1000;background:rgba(26,26,26,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.15);box-shadow:0 4px 30px rgba(0,0,0,.3);}
        .header-container{display:flex;justify-content:space-between;align-items:center}
        .logo{font-size:2rem;font-weight:800;color:#fff;letter-spacing:-.5px}
        .logo span{color:var(--yellow)}
        .nav-menu{display:flex;align-items:center;gap:40px}
        .nav-list{display:flex;gap:30px}
        .nav-list a{color:#fff;font-weight:600;font-size:1rem;transition:.3s;position:relative}
        .nav-list a:hover{color:var(--yellow)}
        .menu-toggle{display:none;background:none;border:none;color:#fff;font-size:1.8rem;cursor:pointer}

        /* ===== 404 PAGE ===== */
        .error-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 20px 60px;
            background: var(--bg-light);
            position: relative;
            overflow: hidden;
        }
        .error-code {
            font-size: clamp(10rem, 25vw, 20rem);
            font-weight: 800;
            line-height: 1;
            color: transparent;
            -webkit-text-stroke: 3px rgba(26,188,156,0.12);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            user-select: none;
        }
        .error-content {
            position: relative;
            z-index: 10;
            max-width: 600px;
            animation: fadeUp 0.8s ease both;
        }
        .error-content h2 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--text-dark);
            margin-bottom: 15px;
            line-height: 1.1;
        }
        .error-content p {
            font-size: 1.1rem;
            color: var(--text-gray);
            margin-bottom: 35px;
            line-height: 1.7;
        }
        .btn-teal{background:var(--teal);color:#fff;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 32px;font-weight:800;font-size:1rem;border:none;cursor:pointer;transition:all .3s;border-radius:10px}
        .btn-teal:hover{background:var(--teal-dark);transform:translateY(-2px);box-shadow:0 8px 20px rgba(26,188,156,.3)}

        /* ===== FOOTER ===== */
        .footer-wave{line-height:0;background:var(--bg-light)}
        .footer-wave svg{display:block;width:100%;height:60px}
        footer{background:var(--bg-dark);color:var(--text-light);padding:60px 0 30px}
        .footer-bottom{border-top:1px solid #333;padding-top:25px;display:flex;justify-content:space-between;font-size:.9rem}

        @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

        @media(max-width:992px){
            .nav-menu{position:fixed;top:0;right:-100%;width:300px;height:100vh;background:#fff;flex-direction:column;align-items:flex-start;padding:100px 30px;box-shadow:-5px 0 15px rgba(0,0,0,.1);transition:.4s cubic-bezier(.77,0,.175,1);z-index:1000}
            .nav-menu.active{right:0}
            .nav-list{flex-direction:column;width:100%;gap:20px;margin-bottom:30px}
            .nav-list a{color:var(--text-dark);font-size:1.2rem}
            .menu-toggle{display:block;z-index:1001}
        }
    </style>
</head>
<body>

<!-- HEADER REMOVED -->

<section class="error-section">
    <div class="error-code">404</div>
    <div class="error-content">
        <h2>Oops! Page Not Found</h2>
        <p>It seems we can't find the page you're looking for. It might have been removed, renamed, or didn't exist in the first place.</p>
        <a href="index.html" class="btn-teal"><i class="fa-solid fa-house"></i> Return to Homepage</a>
    </div>
</section>


</script>

<script>
function validateFooterNL(btn) {
    const container = btn.closest('.newsletter');
    const input = container.querySelector('.footer-nl-email');
    const val = input.value.trim();
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(val)) {
        alert('Please enter a valid email address.');
        input.style.borderColor = 'var(--red)';
        input.focus();
    } else {
        input.style.borderColor = '';
        alert('Thank you for subscribing! Redirecting to confirmation page...');
        window.location.href = '404.html';
    }
}
</script>

</body>
</html>
