<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Stackly NGO Salem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal:#1abc9c; --teal-dark:#16a085;
            --yellow:#f1c40f; --red:#e74c3c;
            --text-dark:#222; --text-gray:#666; --text-light:#999;
            --bg-light:#f9f9f9; --bg-dark:#1a1a1a;
            --border:#e5e5e5; --font:'Manrope',sans-serif;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth}
        html,body{overflow-x:hidden}
        body{color:var(--text-gray);line-height:1.6;font-family:var(--font)}
        .container{max-width:1200px;margin:0 auto;padding:0 20px}
        h1,h2,h3,h4,h5,h6{color:var(--text-dark);font-weight:700;line-height:1.2}
        a{text-decoration:none;color:inherit}
        ul{list-style:none}
        
        /* ===== AUTH PAGE ===== */
        .auth-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            background: url('https://images.unsplash.com/photo-1502086223501-7ea6ecd79368?q=80&w=1920') center/cover no-repeat;
            position: relative;
        }
        .auth-overlay {
            position: absolute; inset: 0; background: linear-gradient(135deg, rgba(20,20,20,0.85), rgba(155,89,182,0.5));
        }
        .auth-card {
            position: relative; z-index: 10;
            background: #fff;
            border-radius: 24px;
            padding: 50px 45px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
            animation: fadeUp 0.8s ease both;
        }
        .auth-head { text-align: center; margin-bottom: 30px; }
        .auth-head h2 { font-size: 2rem; color: var(--text-dark); margin-bottom: 8px; }
        .auth-head p { color: var(--text-gray); font-size: 0.95rem; }
        
        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { font-size: 0.85rem; font-weight: 800; color: var(--text-dark); margin-bottom: 8px; display: block; }
        .input-group input { width: 100%; padding: 14px 18px; border: 2px solid var(--border); border-radius: 10px; font-size: 0.92rem; font-family: var(--font); transition: 0.3s; background: #fff; }
        .input-group input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 4px rgba(26,188,156,0.1); }
        .input-group input.is-invalid { border-color: var(--red); }
        
        .field-error { color: var(--red); font-size: 0.8rem; font-weight: 600; margin-top: 4px; display: none; }
        .field-error.active { display: block; }
        
        .submit-btn { width: 100%; padding: 16px; border-radius: 10px; font-size: 1rem; background:var(--teal); color:#fff; border:none; font-weight:800; cursor:pointer; transition:.3s; display:inline-flex; align-items:center; justify-content:center; gap:8px;}
        .submit-btn:hover { background:var(--teal-dark); transform:translateY(-2px); box-shadow:0 8px 20px rgba(26,188,156,.3); }
        
        .auth-footer { text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-gray); }
        .auth-footer a { color: var(--teal); font-weight: 800; transition: 0.3s; }
        .auth-footer a:hover { color: var(--teal-dark); }

        @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

        @media(max-width:560px){
            .auth-card { padding: 40px 25px; }
        }
    </style>
</head>
<body>

<section class="auth-section">
    <div class="auth-overlay"></div>
    <div class="auth-card">
        <div class="auth-head">
            <h2>Reset Password</h2>
            <p>Enter your registered email and we'll send you a secure link to reset your password.</p>
        </div>
        
        <form id="resetForm" onsubmit="handleReset(event)" novalidate>
            <div class="input-group">
                <label>Email Address *</label>
                <input type="email" id="resetEmail" required placeholder="you@example.com">
                <span class="field-error" id="emailErr">Please enter a valid email address</span>
            </div>
            
            <button type="submit" class="submit-btn" id="resetBtn">
                Send Recovery Link <i class="fa-solid fa-envelope-circle-check"></i>
            </button>
            
            <div class="auth-footer">
                Remembered your password? <a href="login.html">Back to Login</a>
            </div>
        </form>
    </div>
</section>

<script>
    function handleReset(e) {
        e.preventDefault();
        const email = document.getElementById('resetEmail');
        const emailErr = document.getElementById('emailErr');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email.value.trim())) {
            emailErr.classList.add('active'); email.classList.add('is-invalid');
            return;
        } else {
            emailErr.classList.remove('active'); email.classList.remove('is-invalid');
        }

        const btn = document.getElementById('resetBtn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending Link...';
        btn.disabled = true;
        
        setTimeout(() => {
            window.location.href = '404.html';
        }, 1500);
    }
</script>
</body>
</html>
